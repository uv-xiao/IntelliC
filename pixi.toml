[workspace]
name = "htp"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
pip = "*"

[pypi-dependencies]
htp = { path = ".", editable = true }

[feature.dev.dependencies]
pre-commit = ">=3.7.0"
pytest = ">=9.0.0"
ruff = ">=0.14.0"

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.dev.tasks]
lint = "pre-commit run --all-files"
test = "pytest"
verify = { depends-on = ["lint", "test"] }

[environments]
default = ["dev", "py311"]
py310 = ["dev", "py310"]
py311 = ["dev", "py311"]
