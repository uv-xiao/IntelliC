name: policy

on:
  pull_request:
  push:

jobs:
  repo-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_repo_harness.py
      - run: python -m unittest discover -s tests
